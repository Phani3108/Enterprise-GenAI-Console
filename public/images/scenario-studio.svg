<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250" fill="none">
  <rect width="400" height="250" rx="12" fill="#0B1020"/>
  <!-- Left panel - scenario list -->
  <rect x="20" y="20" width="120" height="210" rx="8" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
  <text x="80" y="45" text-anchor="middle" fill="#94A3B8" font-size="9" font-weight="bold" font-family="system-ui">Scenarios</text>
  <rect x="30" y="55" width="100" height="28" rx="6" fill="#4F46E5" opacity="0.15" stroke="#4F46E5" stroke-width="0.5"/>
  <text x="80" y="73" text-anchor="middle" fill="#F8FAFC" font-size="7" font-family="system-ui">Tier-1 Bank Support</text>
  <rect x="30" y="90" width="100" height="28" rx="6" fill="white" opacity="0.02" stroke="#1E293B" stroke-width="0.5"/>
  <text x="80" y="108" text-anchor="middle" fill="#64748B" font-size="7" font-family="system-ui">Fraud Detection</text>
  <rect x="30" y="125" width="100" height="28" rx="6" fill="white" opacity="0.02" stroke="#1E293B" stroke-width="0.5"/>
  <text x="80" y="143" text-anchor="middle" fill="#64748B" font-size="7" font-family="system-ui">Compliance AI</text>
  <!-- Right panel - editor -->
  <rect x="155" y="20" width="225" height="210" rx="8" fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
  <text x="267" y="45" text-anchor="middle" fill="#F8FAFC" font-size="10" font-weight="bold" font-family="system-ui">Scenario Editor</text>
  <!-- Fields -->
  <rect x="170" y="60" width="195" height="24" rx="4" fill="white" opacity="0.03" stroke="#1E293B" stroke-width="0.5"/>
  <text x="180" y="76" fill="#94A3B8" font-size="7" font-family="system-ui">Institution: Tier-1 Bank</text>
  <rect x="170" y="92" width="195" height="24" rx="4" fill="white" opacity="0.03" stroke="#1E293B" stroke-width="0.5"/>
  <text x="180" y="108" fill="#94A3B8" font-size="7" font-family="system-ui">Use Case: Customer Support</text>
  <rect x="170" y="124" width="195" height="24" rx="4" fill="white" opacity="0.03" stroke="#1E293B" stroke-width="0.5"/>
  <text x="180" y="140" fill="#94A3B8" font-size="7" font-family="system-ui">Traffic: 10M req/mo</text>
  <!-- Launch buttons -->
  <rect x="170" y="165" width="58" height="22" rx="4" fill="#06B6D4" opacity="0.2" stroke="#06B6D4" stroke-width="0.5"/>
  <text x="199" y="179" text-anchor="middle" fill="#06B6D4" font-size="6" font-family="system-ui">Cost</text>
  <rect x="235" y="165" width="58" height="22" rx="4" fill="#3B82F6" opacity="0.2" stroke="#3B82F6" stroke-width="0.5"/>
  <text x="264" y="179" text-anchor="middle" fill="#3B82F6" font-size="6" font-family="system-ui">Platform</text>
  <rect x="300" y="165" width="58" height="22" rx="4" fill="#4F46E5" opacity="0.2" stroke="#4F46E5" stroke-width="0.5"/>
  <text x="329" y="179" text-anchor="middle" fill="#4F46E5" font-size="6" font-family="system-ui">Arch</text>
