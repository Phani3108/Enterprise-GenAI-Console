  <line x1="552" y1="175" x2="435" y2="235" stroke="url(#line-grad)" stroke-width="1" opacity="0.5"/>
  <line x1="248" y1="335" x2="365" y2="265" stroke="url(#line-grad)" stroke-width="1" opacity="0.5"/>
  <line x1="552" y1="335" x2="435" y2="265" stroke="url(#line-grad)" stroke-width="1" opacity="0.5"/>
  <line x1="400" y1="128" x2="400" y2="210" stroke="url(#line-grad)" stroke-width="1" opacity="0.5"/>
