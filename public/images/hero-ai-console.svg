  <text x="400" y="255" text-anchor="middle" fill="#F8FAFC" font-size="10" font-family="system-ui">AI</text>
  <!-- Agent nodes -->
  <circle cx="220" cy="160" r="28" stroke="#06B6D4" stroke-width="1.5" fill="#0F172A"/>
